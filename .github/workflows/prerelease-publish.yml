# @opengsd/gsd-pi + CI: manual prerelease channel publish with approval gate
name: Prerelease Publish

# Manual prerelease. Click "Run workflow" in the Actions tab, choose a
# prerelease channel, then publish to the matching npm dist-tag.

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "npm dist-tag and GitHub Environment to publish"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - next
      ref:
        description: "Branch or SHA to publish (defaults: dev -> main, next -> next)"
        required: false
        default: ""

concurrency:
  group: prerelease-publish-${{ github.event.inputs.channel }}-${{ github.event.inputs.ref || 'default' }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  prerelease-publish:
    name: Publish @${{ github.event.inputs.channel }}
    # npm trusted publishing requires GitHub-hosted runners for OIDC.
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: ${{ github.event.inputs.channel }}
    container:
      image: ghcr.io/open-gsd/gsd-ci-builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      env:
        GITHUB_REPO_NAME: ${{ github.repository }}
    outputs:
      version: ${{ steps.stamp.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref != '' && github.event.inputs.ref || (github.event.inputs.channel == 'next' && 'next' || 'main') }}
          token: ${{ secrets.RELEASE_PAT }}
          fetch-depth: 0

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Verify trusted publishing toolchain
        run: |
          node -e "const [major, minor] = process.versions.node.split('.').map(Number); if (major < 22 || (major === 22 && minor < 14)) { throw new Error('Trusted publishing requires Node >= 22.14.0'); }"
          node -e "const v=require('child_process').execSync('npm --version',{encoding:'utf8'}).trim().split('.').map(Number); if (v[0] < 11 || (v[0] === 11 && v[1] < 5) || (v[0] === 11 && v[1] === 5 && v[2] < 1)) { throw new Error('Trusted publishing requires npm >= 11.5.1'); }"

      - name: Install web host dependencies
        run: npm --prefix web ci

      - name: Cache Next.js build
        uses: useblacksmith/cache@v5
        with:
          path: web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}-${{ hashFiles('web/app/**', 'web/components/**', 'web/lib/**', 'web/hooks/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Build core
        run: npm run build:core

      - name: Build web host
        run: npm run build:web-host

      - name: Stamp prerelease version and sync platform packages
        id: stamp
        env:
          VERSION_CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          npm run pipeline:version-stamp
          npm run sync-platform-versions
          echo "version=$(node -e 'process.stdout.write(require("./package.json").version)')" >> "$GITHUB_OUTPUT"

      - name: Smoke test
        run: |
          chmod +x dist/loader.js
          GSD_SMOKE_BINARY="$(pwd)/dist/loader.js"
          export GSD_SMOKE_BINARY
          npm run test:smoke

      - name: Publish @${{ github.event.inputs.channel }}
        env:
          CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          VERSION=$(node -e 'process.stdout.write(require("./package.json").version)')
          if npm view "@opengsd/gsd-pi@${VERSION}" version 2>/dev/null; then
            echo "::error::Version ${VERSION} already exists. Trusted publishing only authenticates npm publish, not dist-tag mutation."
            echo "::error::Move the tag manually if intended: npm dist-tag add @opengsd/gsd-pi@${VERSION} ${CHANNEL}"
            exit 1
          fi
          npm publish --tag "${CHANNEL}"
          echo "Verifying @opengsd/gsd-pi@${VERSION} is reachable on npm..."
          for i in 1 2 3 4 5; do
            npm view "@opengsd/gsd-pi@${VERSION}" version 2>/dev/null && echo "Confirmed: @opengsd/gsd-pi@${VERSION} is live." && exit 0
            echo "Attempt $i: not yet visible - waiting 10s..."
            sleep 10
          done
          echo "::error::Publish step succeeded but @opengsd/gsd-pi@${VERSION} is not reachable on npm after 50s. Check trusted publishing and registry propagation."
          exit 1

  prerelease-verify:
    name: Verify @${{ github.event.inputs.channel }} package
    needs: prerelease-publish
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref != '' && github.event.inputs.ref || (github.event.inputs.channel == 'next' && 'next' || 'main') }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: "npm"

      - name: Install published @opengsd/gsd-pi@${{ github.event.inputs.channel }} globally (with registry propagation retry)
        env:
          PUBLISH_VERSION: ${{ needs.prerelease-publish.outputs.version }}
          CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          for i in 1 2 3 4 5 6; do
            npm install -g "@opengsd/gsd-pi@${PUBLISH_VERSION}" && exit 0
            echo "Attempt $i failed - waiting 10s for npm registry propagation..."
            sleep 10
          done
          echo "::error::Failed to install @opengsd/gsd-pi@${PUBLISH_VERSION} after 6 attempts."
          echo "::error::Recommended actions: (1) investigate the failing step above, (2) if the version exists on npm, deprecate it with 'npm deprecate @opengsd/gsd-pi@${PUBLISH_VERSION} \"broken ${CHANNEL} build; see Actions run\"', (3) cut a fix and re-run Prerelease Publish."
          exit 1

      - name: Run smoke tests (against installed binary)
        run: |
          GSD_SMOKE_BINARY=$(which gsd)
          export GSD_SMOKE_BINARY
          npm run test:smoke

      - name: Install repo dependencies (for regression harness)
        run: npm ci

      - name: Run live regression tests (against installed binary)
        run: |
          GSD_SMOKE_BINARY=$(which gsd)
          export GSD_SMOKE_BINARY
          npm run test:live-regression

      - name: Warn on verify failure
        if: failure()
        env:
          PUBLISH_VERSION: ${{ needs.prerelease-publish.outputs.version }}
          CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          echo "::error::Post-publish verification failed for @opengsd/gsd-pi@${PUBLISH_VERSION}."
          echo "::error::Recommended actions: (1) investigate the failing step above, (2) if the version exists on npm, deprecate it with 'npm deprecate @opengsd/gsd-pi@${PUBLISH_VERSION} \"broken ${CHANNEL} build; see Actions run\"', (3) cut a fix and re-run Prerelease Publish."
          exit 1
