name: GSD Cloud Monitor Release

on:
  push:
    tags:
      - "gsd-cloud-monitor-v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - name: Validate release tag
        working-directory: apps/gsd-cloud-monitor
        run: |
          VERSION="${GITHUB_REF_NAME#gsd-cloud-monitor-v}"
          ./script/validate_release_version.sh "$VERSION"

      - name: Verify monitor behavior
        working-directory: apps/gsd-cloud-monitor
        run: |
          swift run GSDCloudMonitorCoreTests
          swift run GSDCloudMonitorReleaseTests

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/release.keychain-db"
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode >"$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Prepare App Store Connect key
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
        run: echo "$ASC_KEY_BASE64" | base64 --decode >"$RUNNER_TEMP/AuthKey.p8"

      - name: Build, sign, notarize, and package
        working-directory: apps/gsd-cloud-monitor
        env:
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          ASC_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          VERSION="${GITHUB_REF_NAME#gsd-cloud-monitor-v}"
          ./script/package_release.sh --version "$VERSION" --output "$RUNNER_TEMP/release"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "$RUNNER_TEMP/release/GSDCloudMonitor-"* \
            "$RUNNER_TEMP/release/SHA256SUMS" \
            --generate-notes \
            --title "GSD Cloud Monitor ${GITHUB_REF_NAME#gsd-cloud-monitor-v}"
